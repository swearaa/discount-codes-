<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupons Pro</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#f5e9f2,#e6e7fb);
}

.header{
  padding:20px;
  background:linear-gradient(135deg,#e89abf,#9f8cff);
  color:#fff;
  border-bottom-left-radius:25px;
  border-bottom-right-radius:25px;
}

.header h3{
  margin:0;
  font-size:20px;
}

.search input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  outline:none;
  background:#ffffffdd;
}

.container{
  padding:15px;
}

.item{
  background:#faf7fb;
  border-radius:18px;
  padding:15px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.07);
  cursor:pointer;
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:12px;
  object-fit:contain;
  background:#fff;
  padding:4px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.brand{
  font-size:15px;
  font-weight:600;
  color:#444;
}

.code{
  background:linear-gradient(135deg,#d16ba5,#8e7cff);
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
  font-size:13px;
}

.actions{
  display:flex;
  align-items:center;
  gap:8px;
}

button{
  border:none;
  border-radius:10px;
  padding:6px 9px;
  cursor:pointer;
  font-size:13px;
}

.copy{background:#f3d4e5}
.save{background:#ececf3}
.save.active{background:#ffd6ec}

.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#d16ba5;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1}

</style>
</head>

<body>

<div class="header">
  <h3>💖 أكواد الخصم</h3>
  <div class="search">
    <input id="search" placeholder="ابحث عن متجر أو كود">
  </div>
</div>

<div class="container" id="list"></div>

<div class="toast" id="toast"></div>

<script>

const storeData = {

  "Namshi": {site:"https://en-ae.namshi.com", logo:"https://logo.clearbit.com/namshi.com"},
  "NOON": {site:"https://www.noon.com", logo:"https://logo.clearbit.com/noon.com"},
  "Styli": {site:"https://www.styli.com", logo:"https://logo.clearbit.com/styli.com"},
  "Max Fashion": {site:"https://www.maxfashion.com", logo:"https://logo.clearbit.com/maxfashion.com"},
  "Mumzworld": {site:"https://www.mumzworld.com", logo:"https://logo.clearbit.com/mumzworld.com"},
  "Bloomingdale's": {site:"https://www.bloomingdales.ae", logo:"https://logo.clearbit.com/bloomingdales.ae"},
  "Eyewa": {site:"https://www.eyewa.com", logo:"https://logo.clearbit.com/eyewa.com"},
  "Golden Scent": {site:"https://www.goldenscent.com", logo:"https://logo.clearbit.com/goldenscent.com"},

  "Vogacloset": {site:"https://vogacloset.com", logo:"https://logo.clearbit.com/vogacloset.com"},
  "Mamas & Papas": {site:"https://www.mamasandpapas.com", logo:"https://logo.clearbit.com/mamasandpapas.com"},
  "Metro Brazil": {site:"https://www.metrobrazil.com", logo:"https://logo.clearbit.com/metrobrazil.com"},
  "FirstCry": {site:"https://www.firstcry.com", logo:"https://logo.clearbit.com/firstcry.com"},
  "Izil Beauty": {site:"https://www.izilbeauty.com", logo:"https://logo.clearbit.com/izilbeauty.com"},
  "Nayomi": {site:"https://www.nayomi.com", logo:"https://logo.clearbit.com/nayomi.com"},
  "Trendyol": {site:"https://www.trendyol.com", logo:"https://logo.clearbit.com/trendyol.com"},
  "Reef Perfume": {site:"https://reefperfumes.com", logo:"https://logo.clearbit.com/reefperfumes.com"},
  "Sandro": {site:"https://www.sandro-paris.com", logo:"https://logo.clearbit.com/sandro-paris.com"},
  "6thStreet": {site:"https://www.6thstreet.com", logo:"https://logo.clearbit.com/6thstreet.com"},
  "Riva": {site:"https://rivafashion.com", logo:"https://logo.clearbit.com/rivafashion.com"},
  "Level Shoes": {site:"https://www.levelshoes.com", logo:"https://logo.clearbit.com/levelshoes.com"},
  "Nice One": {site:"https://niceonesa.com", logo:"https://logo.clearbit.com/niceonesa.com"},

  // هذا الوحيد ممكن ما يطلع له لوقو
  "مفارش العييري": {
    site:"#",
    logo:"https://dummyimage.com/80x80/000/fff&text=A"
  }

};
  
  

  
const coupons = [
{brand:"Vogacloset",code:"GGG"},
{brand:"Vogacloset",code:"GM"},
{brand:"Mamas & Papas",code:"ADL12"},
{brand:"Styli",code:"TSSS"},
{brand:"Mumzworld",code:"ADL33"},
{brand:"Mumzworld",code:"XV9"},
{brand:"NOON",code:"ZZZ10"},
{brand:"NOON",code:"SWE22"},
{brand:"Metro Brazil",code:"VRS23"},
{brand:"Metro Brazil",code:"AD55"},
{brand:"FirstCry",code:"DT"},
{brand:"Izil Beauty",code:"MM90"},
{brand:"Nayomi",code:"NEW93"},
{brand:"Namshi",code:"SW7"},
{brand:"Max Fashion",code:"ATRD"},
{brand:"Trendyol",code:"SWEA"},
{brand:"Bloomingdale's",code:"ADL3"},
{brand:"Reef Perfume",code:"REE2"},
{brand:"Sandro",code:"SAN40"},
{brand:"6thStreet",code:"EB52"},
{brand:"Golden Scent",code:"G4WQ"},
{brand:"Riva",code:"SKK6"},
{brand:"Eyewa",code:"KSA19"},
{brand:"Level Shoes",code:"LEV67"},
{brand:"Nice One",code:"S67"},
{brand:"مفارش العييري",code:"KY43"}
];

let saved = JSON.parse(localStorage.getItem("savedCoupons")) || [];

function render(data){
  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(c=>{
    const info = storeData[c.brand] || {site:"#", logo:"https://via.placeholder.com/40"};

    const div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <div class="left">
        <img class="logo" src="${info.logo}">
        <div class="brand">${c.brand}</div>
      </div>

      <div class="actions">
        <div class="code">${c.code}</div>
        <button class="save">⭐</button>
        <button class="copy">📋</button>
      </div>
    `;

    // فتح الموقع عند الضغط على الكارت
    div.onclick=(e)=>{
      // تجاهل الضغط على الأزرار
      if(e.target.closest('button')) return;

      // فتح المتجر في نفس التبويب فقط
      window.location.href = info.site;
    };

    // نسخ + توجيه للموقع
    div.querySelector(".copy").onclick=(e)=>{
      e.stopPropagation();
      navigator.clipboard.writeText(c.code);
      toast("تم النسخ 💖");

      // توجيه لنفس التبويب فقط بدون أي نافذة جديدة
      window.location.href = info.site;
    };

    // مفضلة
    div.querySelector(".save").onclick=(e)=>{
      e.stopPropagation();
      if(!saved.find(s=>s.code===c.code)){
        saved.push(c);
        localStorage.setItem("savedCoupons",JSON.stringify(saved));
        toast("تم الحفظ ⭐");
      }
    };

    list.appendChild(div);
  });
}

// search

document.getElementById("search").oninput=(e)=>{
  const v=e.target.value.toLowerCase();
  render(coupons.filter(c=>
    c.brand.toLowerCase().includes(v) ||
    c.code.toLowerCase().includes(v)
  ));
};

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

render(coupons);

</script>

</body>
</html>
